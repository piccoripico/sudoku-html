<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数独 (Sudoku)</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main>
    <header class="hero">
      <h1 id="title">数独 (Sudoku)</h1>
      <div class="utility-actions">
        <div class="utility-buttons">
          <button class="ghost" id="saveGame" type="button">状態を保存</button>
          <button class="ghost" id="loadGame" type="button">保存を読込</button>
          <button class="ghost" id="help" type="button" aria-haspopup="dialog" aria-controls="helpOverlay" aria-expanded="false">使い方</button>
        </div>
        <div class="timer" id="timer" aria-live="polite">--:--</div>
        <input id="loadFile" type="file" accept=".json,application/json" hidden />
      </div>
    </header>

    <div class="top-bar">
      <div class="settings-grid">
        <div class="field">
          <label id="clueCountLabel" for="clueCount">ヒント数</label>
          <select id="clueCount">
            <option value="17">17 (最難関)</option>
            <option value="18">18</option>
            <option value="20">20</option>
            <option value="22">22</option>
            <option value="24">24 (かなり難しい)</option>
            <option value="26">26</option>
            <option value="28">28 (難しめ)</option>
            <option value="30">30</option>
            <option value="32" selected>32 (標準)</option>
            <option value="34">34</option>
            <option value="36">36</option>
            <option value="38">38 (易しめ)</option>
            <option value="40">40</option>
            <option value="42">42</option>
            <option value="44">44 (かなり易しい)</option>
            <option value="46">46</option>
            <option value="48">48</option>
          </select>
        </div>

        <div class="field">
          <label id="seedLabel" for="seed">シード</label>
          <input id="seed" type="number" placeholder="任意" />
        </div>

        <div class="field">
          <label id="langLabel" for="lang">Language</label>
          <select id="lang">
            <option value="ja">Japanese</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <div class="action-row primary-actions">
        <button class="primary" id="newGame" type="button">新しい盤面を作成</button>
        <button class="ghost" id="reset" type="button">最初の状態に戻す</button>
        <button class="ghost" id="hint" type="button">ヒントを埋める</button>
        <button class="ghost" id="solve" type="button">答えを表示</button>
      </div>
    </div>

    <div class="board-wrapper">
      <div class="board" id="board" aria-label="Sudoku board"></div>
      <div class="panel">
        <h2 id="padTitle">数字パッド</h2>
        <div class="pad" id="pad"></div>
        <div class="controls">
          <button class="ghost" id="undo">↩️ １つ戻す</button>
          <button class="ghost" id="redo">↪️ １つ進める</button>
        </div>
        <p class="hint-text" id="hintText"></p>
        <div class="stats" id="stats"></div>
        <div class="status" id="status"></div>
      </div>
    </div>

    <div class="help-overlay" id="helpOverlay" hidden>
      <section class="help-dialog" id="helpDialog" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
        <div class="help-header">
          <h2 id="helpTitle">ゲームの使い方</h2>
          <button class="ghost" id="helpClose" type="button">閉じる</button>
        </div>
        <div class="help-content" id="helpContent"></div>
      </section>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
