<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数独 (Sudoku)</title>
  <style>
    :root {
      --accent: #0f766e;
      --accent-light: #14b8a6;
      --bg: #f8fafc;
      --line: #cbd5e1;
      --text: #0f172a;
      --error: #ef4444;
      --complete: #dcfce7;
      --conflict: #fef3c7;
      --note: #e2e8f0;
    }
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px;
    }
    main {
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border-radius: 16px;
      padding: 24px;
      width: min(960px, 100%);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      margin: 0 0 16px;
      color: #475569;
    }
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .timer {
      margin-left: auto;
      font-weight: 700;
      padding: 8px 12px;
      background: #eef2ff;
      border-radius: 10px;
      color: #312e81;
    }
    label {
      font-weight: 600;
      margin-right: 8px;
    }
    input, select, button {
      font-size: 16px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    input:focus, select:focus, button:focus-visible {
      outline: 3px solid rgba(20, 184, 166, 0.35);
      outline-offset: 2px;
    }
    button {
      background: white;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.12s ease;
    }
    button:hover {
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }
    button.primary {
      background: linear-gradient(120deg, var(--accent), var(--accent-light));
      color: white;
      border: none;
    }
    button.ghost {
      background: transparent;
      border: 1px solid var(--line);
    }
    .board-wrapper {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .board-wrapper {
        grid-template-columns: 1fr;
      }
    }
    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      gap: 0;
      border: 2px solid #0f172a;
      border-radius: 12px;
      overflow: hidden;
      background: white;
      aspect-ratio: 1 / 1;
    }
    .cell {
      position: relative;
      border: 1px solid var(--line);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      user-select: none;
      cursor: pointer;
      background: white;
      transition: background 0.1s ease, color 0.1s ease;
    }
    .cell:nth-child(3n + 1) {
      border-left: 2px solid #0f172a;
    }
    .cell:nth-child(-n + 9) {
      border-top: 2px solid #0f172a;
    }
    .cell[data-row="3"], .cell[data-row="6"] {
      border-top: 2px solid #0f172a;
    }
    .cell[data-col="3"], .cell[data-col="6"] {
      border-left: 2px solid #0f172a;
    }
    .cell.given { font-weight: 700; background: #f8fafc; }
    .cell.selected { outline: 3px solid rgba(20,184,166,0.45); z-index: 1; }
    .cell.completed-number { background: var(--complete); color: #166534; }
    .cell.conflict { background: var(--conflict); }
    .cell .notes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2px;
      width: 100%;
      height: 100%;
      padding: 6px;
      box-sizing: border-box;
      color: #475569;
      font-size: 12px;
      text-align: center;
      line-height: 1.3;
    }
    .cell .notes span { display: block; min-height: 10px; }
    .cell .notes span.highlighted { color: var(--error); font-weight: 700; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f8fafc;
    }
    .toggle.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(20,184,166,0.2); }
    .pad button.secondary { background: #f1f5f9; }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      background: #f9fafb;
    }
    .panel h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 18px;
    }
    .pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .pad button {
      padding: 12px 0;
      font-size: 20px;
      border-radius: 10px;
    }
    .pad .pad-action {
      padding: 12px 0;
      font-size: 18px;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      background: #f8fafc;
      border: 1px solid var(--line);
    }
    .pad .pad-action.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(20,184,166,0.2);
      font-weight: 700;
    }
    .status {
      margin-top: 12px;
      font-weight: 600;
      color: #1f2937;
    }
    .status.success { color: #15803d; }
    .status.warning { color: var(--error); }
    .stats {
      margin-top: 8px;
      color: #475569;
      font-size: 14px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .hint-text { color: #475569; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <main>
    <h1 id="title">数独 (Sudoku)</h1>
    <div class="top-bar">
      <div>
        <label id="clueCountLabel" for="clueCount">ヒント数</label>
        <select id="clueCount">
          <option value="17">17 (最難関)</option>
          <option value="18">18</option>
          <option value="20">20</option>
          <option value="22">22</option>
          <option value="24">24 (かなり難しい)</option>
          <option value="26">26</option>
          <option value="28">28 (難しめ)</option>
          <option value="30">30</option>
          <option value="32" selected>32 (標準)</option>
          <option value="34">34</option>
          <option value="36">36</option>
          <option value="38">38 (易しめ)</option>
          <option value="40">40</option>
          <option value="42">42</option>
          <option value="44">44 (かなり易しい)</option>
          <option value="46">46</option>
          <option value="48">48</option>
        </select>
      </div>
      <div>
        <label id="seedLabel" for="seed">シード</label>
        <input id="seed" type="number" placeholder="任意" />
      </div>
      <div>
        <label id="langLabel" for="lang">Language</label>
        <select id="lang">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>
      <button class="primary" id="newGame"></button>
      <button class="ghost" id="reset"></button>
      <button class="ghost" id="hint"></button>
      <button class="ghost" id="solve"></button>
      <div class="timer" id="timer" aria-live="polite">--:--</div>
    </div>

    <div class="board-wrapper">
      <div class="board" id="board" aria-label="Sudoku board"></div>
      <div class="panel">
        <h2 id="padTitle">数字パッド</h2>
        <div class="pad" id="pad"></div>
        <div class="controls">
          <button class="ghost" id="undo">↩️ １つ戻す</button>
          <button class="ghost" id="redo">↪️ １つ進める</button>
        </div>
        <p class="hint-text" id="hintText"></p>
        <div class="stats" id="stats"></div>
        <div class="status" id="status"></div>
      </div>
    </div>
  </main>

  <script>
    const boardEl = document.getElementById('board');
    const padEl = document.getElementById('pad');
    const statusEl = document.getElementById('status');
    const statsEl = document.getElementById('stats');
    const timerEl = document.getElementById('timer');
    let noteToggleEl = null;
    const undoEl = document.getElementById('undo');
    const redoEl = document.getElementById('redo');
    let puzzle = [];
    let solution = [];
    let current = [];
    let notes = [];
    let givens = new Set();
    let selected = null;
    let noteMode = false;
    let history = [];
    let future = [];
    let solutionDigitMap = new Map();
    let timerStart = null;
    let timerInterval = null;
    let solvedAt = null;
    let hintCount = 0;
    let solutionRevealed = false;
    let selectedClueCount = 32;
    let selectedSeedRaw = '';
    let selectedSeedWasRandom = true;
    let currentLang = 'ja';

    const I18N = {
      ja: {
        title: '数独 (Sudoku)',
        clueLabel: 'ヒント数',
        seedLabel: 'シード',
        langLabel: '言語',
        seedPlaceholder: '任意',
        newGame: '新しい盤面を作成',
        reset: '最初の状態に戻す',
        hint: 'ヒントを埋める',
        solve: '答えを表示',
        padTitle: '数字パッド',
        undo: '↩️ １つ戻す',
        redo: '↪️ １つ進める',
        noteButton: '✏️ メモ',
        clearButton: '消去',
        boardAriaLabel: '数独盤面',
        hintText: 'キーボードの 1-9 で入力、0 / Delete / Backspace で削除、矢印で移動、Enter でメモモード切替ができます。メモモード時は右クリックまたは Shift+1〜9 で赤色メモにできます。',
        statusLoading: '読み込み中...',
        statusGenerating: '生成中...',
        statusInputPrompt: '数字を入力してください。',
        statusNoHint: 'ヒントを出せるマスがありません。',
        statusSolved: 'おめでとうございます！すべて正解です。（タイム: {time}）',
        statusSolutionShown: '解答を表示しました。',
        statsHintUsed: 'ヒント使用: {count}回',
        statsSolutionShown: '解答表示: {state}',
        statsClues: '実ヒント数: {count}',
        statsSeed: 'シード: {seed}',
        yes: 'あり',
        no: 'なし',
        randomSeed: 'ランダム({seed})',
        clueOptionLabels: {
          17: '17 (最難関)',
          24: '24 (かなり難しい)',
          28: '28 (難しめ)',
          32: '32 (標準)',
          38: '38 (易しめ)',
          44: '44 (かなり易しい)'
        }
      },
      en: {
        title: 'Sudoku',
        clueLabel: 'Clues',
        seedLabel: 'Seed',
        langLabel: 'Language',
        seedPlaceholder: 'Optional',
        newGame: 'New Puzzle',
        reset: 'Reset to Start',
        hint: 'Fill a Hint',
        solve: 'Show Solution',
        padTitle: 'Number Pad',
        undo: '↩️ Undo',
        redo: '↪️ Redo',
        noteButton: '✏️ Note',
        clearButton: 'Clear',
        boardAriaLabel: 'Sudoku board',
        hintText: 'Use 1-9 to input, 0 / Delete / Backspace to clear, arrow keys to move, and Enter to toggle note mode. In note mode, right-click or Shift+1-9 creates red notes.',
        statusLoading: 'Loading...',
        statusGenerating: 'Generating...',
        statusInputPrompt: 'Enter numbers to solve the puzzle.',
        statusNoHint: 'No empty cell is available for a hint.',
        statusSolved: 'Congratulations! Puzzle solved. (Time: {time})',
        statusSolutionShown: 'Solution displayed.',
        statsHintUsed: 'Hints used: {count}',
        statsSolutionShown: 'Solution shown: {state}',
        statsClues: 'Actual clues: {count}',
        statsSeed: 'Seed: {seed}',
        yes: 'yes',
        no: 'no',
        randomSeed: 'random({seed})',
        clueOptionLabels: {
          17: '17 (hardest)',
          24: '24 (very hard)',
          28: '28 (hard)',
          32: '32 (normal)',
          38: '38 (easy)',
          44: '44 (very easy)'
        }
      }
    };

    function t(key, vars = {}) {
      const dict = I18N[currentLang] || I18N.ja;
      const template = dict[key] ?? I18N.ja[key] ?? '';
      return String(template).replace(/\{(\w+)\}/g, (_, name) => vars[name] ?? '');
    }

    function formatSeedDisplay(seedValue, isRandom) {
      return isRandom ? t('randomSeed', { seed: seedValue }) : seedValue;
    }

    function updateClueOptionLabels() {
      const select = document.getElementById('clueCount');
      const localized = I18N[currentLang].clueOptionLabels || {};
      for (const option of select.options) {
        const value = Number(option.value);
        const base = localized[value] || String(value);
        option.textContent = base;
      }
    }

    function applyLanguage(lang) {
      currentLang = I18N[lang] ? lang : 'ja';
      document.documentElement.lang = currentLang;
      const langSelect = document.getElementById('lang');
      if (langSelect && langSelect.value !== currentLang) langSelect.value = currentLang;

      document.getElementById('title').textContent = t('title');
      document.getElementById('clueCountLabel').textContent = t('clueLabel');
      document.getElementById('seedLabel').textContent = t('seedLabel');
      document.getElementById('langLabel').textContent = t('langLabel');
      document.getElementById('seed').placeholder = t('seedPlaceholder');
      document.getElementById('newGame').textContent = t('newGame');
      document.getElementById('reset').textContent = t('reset');
      document.getElementById('hint').textContent = t('hint');
      document.getElementById('solve').textContent = t('solve');
      document.getElementById('padTitle').textContent = t('padTitle');
      document.getElementById('hintText').textContent = t('hintText');
      boardEl.setAttribute('aria-label', t('boardAriaLabel'));
      undoEl.textContent = t('undo');
      redoEl.textContent = t('redo');

      updateClueOptionLabels();
      if (noteToggleEl) noteToggleEl.textContent = t('noteButton');
      const clearBtn = padEl.querySelector('button.secondary');
      if (clearBtn) clearBtn.textContent = t('clearButton');

      updateStats();
      updateStatus();
    }

    function initLanguage() {
      const savedLang = localStorage.getItem('sudoku_lang');
      const browserLang = (navigator.language || '').toLowerCase().startsWith('ja') ? 'ja' : 'en';
      const preferred = savedLang && I18N[savedLang] ? savedLang : browserLang;
      applyLanguage(preferred);
      const langSelect = document.getElementById('lang');
      langSelect.addEventListener('change', (event) => {
        const lang = event.target.value;
        applyLanguage(lang);
        localStorage.setItem('sudoku_lang', currentLang);
      });
    }

    function createRng(seedInput) {
      if (seedInput === '' || seedInput === null || seedInput === undefined) return Math.random;
      const numeric = Number(seedInput);
      if (!Number.isFinite(numeric)) return Math.random;
      let state = numeric >>> 0 || 1;
      return () => {
        state ^= state << 13; state >>>= 0;
        state ^= state >> 17; state >>>= 0;
        state ^= state << 5;  state >>>= 0;
        return (state >>> 0) / 0xffffffff;
      };
    }

    function shuffle(array, rand) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function isSafe(board, row, col, value) {
      for (let i = 0; i < 9; i++) {
        if (board[row][i] === value || board[i][col] === value) return false;
      }
      const startRow = 3 * Math.floor(row / 3);
      const startCol = 3 * Math.floor(col / 3);
      for (let r = startRow; r < startRow + 3; r++) {
        for (let c = startCol; c < startCol + 3; c++) {
          if (board[r][c] === value) return false;
        }
      }
      return true;
    }

    function findEmpty(board) {
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (board[r][c] === 0) return [r, c];
        }
      }
      return null;
    }

    function solveBoard(board) {
      const empty = findEmpty(board);
      if (!empty) return board.map(row => [...row]);
      const [r, c] = empty;
      for (let value = 1; value <= 9; value++) {
        if (isSafe(board, r, c, value)) {
          board[r][c] = value;
          const solved = solveBoard(board);
          if (solved) return solved;
          board[r][c] = 0;
        }
      }
      board[r][c] = 0;
      return null;
    }

    function countSolutions(board, limit = 2, budget = null) {
      const rowMask = Array(9).fill(0);
      const colMask = Array(9).fill(0);
      const boxMask = Array(9).fill(0);
      const empties = [];

      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const value = board[r][c];
          if (value === 0) {
            empties.push([r, c]);
            continue;
          }
          const bit = 1 << value;
          const box = 3 * Math.floor(r / 3) + Math.floor(c / 3);
          rowMask[r] |= bit;
          colMask[c] |= bit;
          boxMask[box] |= bit;
        }
      }

      function popcount(n) {
        let count = 0;
        while (n) {
          n &= n - 1;
          count += 1;
        }
        return count;
      }

      function solve(index = 0) {
        if (budget) {
          budget.calls += 1;
          if (budget.calls > budget.maxCalls) return 0;
        }

        let bestIndex = -1;
        let bestCandidates = 0;
        let bestCount = 10;

        for (let i = index; i < empties.length; i++) {
          const [r, c] = empties[i];
          if (board[r][c] !== 0) continue;
          const box = 3 * Math.floor(r / 3) + Math.floor(c / 3);
          const used = rowMask[r] | colMask[c] | boxMask[box];
          const candidates = (~used) & 0x3FE;
          const count = popcount(candidates);
          if (count === 0) return 0;
          if (count < bestCount) {
            bestCount = count;
            bestCandidates = candidates;
            bestIndex = i;
            if (count === 1) break;
          }
        }

        if (bestIndex === -1) return 1;

        [empties[index], empties[bestIndex]] = [empties[bestIndex], empties[index]];
        const [r, c] = empties[index];
        const box = 3 * Math.floor(r / 3) + Math.floor(c / 3);

        let solutions = 0;
        for (let value = 1; value <= 9; value++) {
          const bit = 1 << value;
          if ((bestCandidates & bit) === 0) continue;

          board[r][c] = value;
          rowMask[r] |= bit;
          colMask[c] |= bit;
          boxMask[box] |= bit;

          solutions += solve(index + 1);

          rowMask[r] &= ~bit;
          colMask[c] &= ~bit;
          boxMask[box] &= ~bit;
          board[r][c] = 0;

          if (solutions >= limit) break;
          if (budget && budget.calls > budget.maxCalls) break;
        }

        [empties[index], empties[bestIndex]] = [empties[bestIndex], empties[index]];
        return solutions;
      }

      return solve(0);
    }

    function generateFullBoard(rand) {
      const board = Array.from({ length: 9 }, () => Array(9).fill(0));
      const nums = [1,2,3,4,5,6,7,8,9];

      function backtrack(cell = 0) {
        if (cell === 81) return true;
        const r = Math.floor(cell / 9);
        const c = cell % 9;
        if (board[r][c] !== 0) return backtrack(cell + 1);
        const shuffled = [...nums];
        shuffle(shuffled, rand);
        for (const value of shuffled) {
          if (isSafe(board, r, c, value)) {
            board[r][c] = value;
            if (backtrack(cell + 1)) return true;
            board[r][c] = 0;
          }
        }
        return false;
      }

      backtrack();
      return board;
    }

    function clampClues(value) {
      return Math.max(17, Math.min(81, value));
    }

    function generatePuzzle(clues, seedValue) {
      const clueCount = clampClues(clues);
      const maxAttempts = clueCount <= 18 ? 8 : clueCount <= 22 ? 5 : clueCount <= 24 ? 3 : 1;
      const totalTimeBudgetMs = clueCount <= 22 ? 2200 : clueCount <= 24 ? 1400 : 700;
      const startedAt = performance.now();
      let best = null;

      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        if (performance.now() - startedAt > totalTimeBudgetMs && best) break;

        const rand = createRng(`${seedValue}:${attempt}`);
        const solutionBoard = generateFullBoard(rand);
        const puzzleBoard = solutionBoard.map(row => [...row]);
        const cells = [];
        for (let r = 0; r < 9; r++) {
          for (let c = 0; c < 9; c++) cells.push([r, c]);
        }
        shuffle(cells, rand);

        let removed = 0;
        const uniquenessBudget = {
          calls: 0,
          maxCalls: clueCount <= 22 ? 70000 : clueCount <= 24 ? 45000 : 22000
        };

        for (let i = 0; i < cells.length; i++) {
          const [r, c] = cells[i];
          if (81 - removed <= clueCount) break;
          if (performance.now() - startedAt > totalTimeBudgetMs && best) break;
          if (uniquenessBudget.calls > uniquenessBudget.maxCalls) break;

          const remainingCells = cells.length - i;
          const neededRemovals = (81 - removed) - clueCount;
          if (remainingCells < neededRemovals) break;

          const backup = puzzleBoard[r][c];
          puzzleBoard[r][c] = 0;
          const copy = puzzleBoard.map(row => [...row]);
          if (countSolutions(copy, 2, uniquenessBudget) !== 1) {
            puzzleBoard[r][c] = backup;
          } else {
            removed += 1;
          }
        }

        const actualClueCount = 81 - removed;
        if (!best || actualClueCount < best.actualClueCount) {
          best = { puzzleBoard, solutionBoard, actualClueCount };
        }
        if (actualClueCount === clueCount) {
          return { puzzleBoard, solutionBoard, actualClueCount };
        }
      }

      const forcedRand = createRng(`${seedValue}:forced`);
      const forcedPuzzleBoard = best.puzzleBoard.map(row => [...row]);
      const filledCells = [];
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (forcedPuzzleBoard[r][c] !== 0) filledCells.push([r, c]);
        }
      }
      shuffle(filledCells, forcedRand);
      let currentClues = best.actualClueCount;
      for (const [r, c] of filledCells) {
        if (currentClues <= clueCount) break;
        forcedPuzzleBoard[r][c] = 0;
        currentClues -= 1;
      }

      return {
        puzzleBoard: forcedPuzzleBoard,
        solutionBoard: best.solutionBoard,
        actualClueCount: currentClues
      };
    }

    function cellKey(r, c) { return `${r}-${c}`; }

    function cloneBoard(board) {
      return board.map(row => [...row]);
    }

    function cloneNotes(notesBoard) {
      return notesBoard.map(row => row.map(noteMap => new Map(noteMap)));
    }

    function recordStateForUndo() {
      history.push({ current: cloneBoard(current), notes: cloneNotes(notes) });
      if (history.length > 200) history.shift();
      future = [];
    }

    function restoreState(state) {
      current = cloneBoard(state.current);
      notes = cloneNotes(state.notes);
      renderBoard();
      updateStatus();
    }

    function toggleNoteMode(force) {
      if (typeof force === 'boolean') {
        noteMode = force;
      } else {
        noteMode = !noteMode;
      }
      if (noteToggleEl) {
        noteToggleEl.classList.toggle('active', noteMode);
        noteToggleEl.textContent = t('noteButton');
      }
    }

    function startTimer() {
      timerStart = Date.now();
      solvedAt = null;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimerDisplay, 1000);
      updateTimerDisplay();
    }

    function stopTimer(final = false) {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      if (final) updateTimerDisplay(true);
    }

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
      const seconds = (totalSeconds % 60).toString().padStart(2, '0');
      return `${minutes}:${seconds}`;
    }

    function updateTimerDisplay(freeze = false) {
      if (!timerStart) {
        timerEl.textContent = '--:--';
        return;
      }
      const now = freeze && solvedAt ? solvedAt : Date.now();
      timerEl.textContent = formatTime(now - timerStart);
    }

    function buildBoard() {
      boardEl.innerHTML = '';
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = r;
          cell.dataset.col = c;
          cell.addEventListener('click', () => selectCell(cell));
          boardEl.appendChild(cell);
        }
      }
    }

    function buildPad() {
      padEl.innerHTML = '';
      for (let i = 1; i <= 9; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = 'num';
        btn.addEventListener('click', () => applyValue(i));
        btn.addEventListener('contextmenu', (event) => {
          event.preventDefault();
          applyValue(i, { highlightNote: true });
        });
        padEl.appendChild(btn);
      }
      noteToggleEl = document.createElement('button');
      noteToggleEl.textContent = t('noteButton');
      noteToggleEl.className = 'pad-action';
      noteToggleEl.addEventListener('click', () => toggleNoteMode());
      padEl.appendChild(noteToggleEl);
      const clearBtn = document.createElement('button');
      clearBtn.textContent = t('clearButton');
      clearBtn.classList.add('secondary');
      clearBtn.addEventListener('click', () => applyValue(0));
      padEl.appendChild(clearBtn);
    }

    function ensureNotes() {
      notes = Array.from({ length: 9 }, () => Array.from({ length: 9 }, () => new Map()));
    }

    function selectCell(cell) {
      if (selected) {
        selected.classList.remove('selected');
      }
      selected = cell;
      selected.classList.add('selected');
    }

    function applyValue(value, options = {}) {
      const { highlightNote = false } = options;
      if (!selected) return;
      const r = Number(selected.dataset.row);
      const c = Number(selected.dataset.col);
      if (givens.has(cellKey(r, c))) return;

      if (highlightNote && !noteMode) {
        return applyValue(value, { highlightNote: false });
      }

      if (noteMode) {
        const noteMap = notes[r][c];
        if (value === 0) {
          if (!noteMap.size) return;
          recordStateForUndo();
          noteMap.clear();
        } else if (highlightNote) {
          const existing = noteMap.get(value);
          if (existing && existing.highlighted) return;
          recordStateForUndo();
          noteMap.set(value, { highlighted: true });
        } else {
          const existing = noteMap.get(value);
          if (existing) {
            recordStateForUndo();
            noteMap.delete(value);
          } else {
            recordStateForUndo();
            noteMap.set(value, { highlighted: false });
          }
        }
      } else {
        const currentValue = current[r][c];
        const nextValue = value === currentValue ? 0 : value;
        if (nextValue === currentValue) return;
        recordStateForUndo();
        current[r][c] = nextValue;
        notes[r][c].clear();
      }

      renderBoard();
      updateStatus();
    }

    function calculateConflicts() {
      const conflicts = new Set();
      // rows and columns
      for (let i = 0; i < 9; i++) {
        const rowMap = new Map();
        const colMap = new Map();
        for (let j = 0; j < 9; j++) {
          const rowVal = current[i][j];
          const colVal = current[j][i];
          if (rowVal) {
            const arr = rowMap.get(rowVal) || [];
            arr.push([i, j]);
            rowMap.set(rowVal, arr);
          }
          if (colVal) {
            const arr = colMap.get(colVal) || [];
            arr.push([j, i]);
            colMap.set(colVal, arr);
          }
        }
        for (const arr of [...rowMap.values(), ...colMap.values()]) {
          if (arr.length > 1) arr.forEach(([r, c]) => conflicts.add(cellKey(r, c)));
        }
      }
      // blocks
      for (let br = 0; br < 3; br++) {
        for (let bc = 0; bc < 3; bc++) {
          const map = new Map();
          for (let r = br * 3; r < br * 3 + 3; r++) {
            for (let c = bc * 3; c < bc * 3 + 3; c++) {
              const val = current[r][c];
              if (!val) continue;
              const arr = map.get(val) || [];
              arr.push([r, c]);
              map.set(val, arr);
            }
          }
          for (const arr of map.values()) {
            if (arr.length > 1) arr.forEach(([r, c]) => conflicts.add(cellKey(r, c)));
          }
        }
      }
      return conflicts;
    }

    function calculateCompletedNumbers() {
      const completed = new Set();
      for (let num = 1; num <= 9; num++) {
        const positions = solutionDigitMap.get(num) || [];
        if (positions.length === 9 && positions.every(([r, c]) => current[r][c] === num)) {
          completed.add(num);
        }
      }
      return completed;
    }

    function renderCell(r, c, conflicts, completedNumbers) {
      const value = current[r][c];
      const cell = boardEl.children[r * 9 + c];
      cell.classList.toggle('selected', cell === selected);
      cell.classList.toggle('given', givens.has(cellKey(r, c)));
      cell.classList.toggle('completed-number', value && completedNumbers.has(value) && value === solution[r][c]);
      cell.classList.toggle('conflict', conflicts.has(cellKey(r, c)));

      cell.innerHTML = '';
      if (value) {
        cell.textContent = value;
      } else {
        const noteMap = notes[r][c];
        if (noteMap.size) {
          const notesGrid = document.createElement('div');
          notesGrid.className = 'notes';
          for (let i = 1; i <= 9; i++) {
            const span = document.createElement('span');
            const entry = noteMap.get(i);
            if (entry) {
              span.textContent = i;
              if (entry.highlighted) {
                span.classList.add('highlighted');
              }
            }
            notesGrid.appendChild(span);
          }
          cell.appendChild(notesGrid);
        }
      }
    }

    function renderBoard() {
      const conflicts = calculateConflicts();
      const completedNumbers = calculateCompletedNumbers();
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          renderCell(r, c, conflicts, completedNumbers);
        }
      }
    }

    function setStatus(message, type = '') {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function updateStats() {
      const hintText = t('statsHintUsed', { count: hintCount });
      const solutionText = t('statsSolutionShown', { state: solutionRevealed ? t('yes') : t('no') });
      const clueText = t('statsClues', { count: selectedClueCount });
      const seedText = t('statsSeed', { seed: formatSeedDisplay(selectedSeedRaw, selectedSeedWasRandom) });
      statsEl.textContent = `${hintText} / ${solutionText} / ${clueText} / ${seedText}`;
    }

    function updateStatus() {
      if (!current.length || !solution.length) {
        setStatus(t('statusLoading'));
        return;
      }
      let filled = true;
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const value = current[r][c];
          if (value === 0) filled = false;
        }
      }
      if (filled && isSolved()) {
        if (!solvedAt) {
          solvedAt = Date.now();
          stopTimer(true);
        }
        setStatus(t('statusSolved', { time: formatTime(solvedAt - timerStart) }), 'success');
      } else {
        setStatus(t('statusInputPrompt'));
      }
    }

    function isSolved() {
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (current[r][c] !== solution[r][c]) return false;
        }
      }
      return true;
    }

    function resetBoard(pushHistory = true, restartTimer = false) {
      if (pushHistory) recordStateForUndo();
      current = cloneBoard(puzzle);
      ensureNotes();
      solvedAt = null;
      hintCount = 0;
      solutionRevealed = false;
      if (restartTimer) {
        startTimer();
      } else {
        updateTimerDisplay();
      }
      renderBoard();
      updateStats();
      updateStatus();
    }

    function loadNewPuzzle() {
      const clues = Number(document.getElementById('clueCount').value);
      const seedInput = document.getElementById('seed');
      const seedValueRaw = seedInput.value.trim();
      const seedWasRandom = seedValueRaw === '';
      const seedValue = seedWasRandom ? Math.floor(Math.random() * 1_000_000_000).toString() : seedValueRaw;
      setStatus(t('statusGenerating'));

      const { puzzleBoard, solutionBoard, actualClueCount } = generatePuzzle(clues, seedValue);
      puzzle = puzzleBoard;
      solution = solutionBoard;
      selectedClueCount = actualClueCount;
      selectedSeedRaw = seedValue;
      selectedSeedWasRandom = seedWasRandom;
      solutionDigitMap = new Map();
      for (let num = 1; num <= 9; num++) solutionDigitMap.set(num, []);
      givens = new Set();
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const val = puzzle[r][c];
          if (val) givens.add(cellKey(r, c));
          solutionDigitMap.get(solution[r][c]).push([r, c]);
        }
      }
      history = [];
      future = [];
      hintCount = 0;
      solutionRevealed = false;
      ensureNotes();
      current = cloneBoard(puzzle);
      renderBoard();
      updateStats();
      updateStatus();
      selected = boardEl.firstChild;
      if (selected) selectCell(selected);
      toggleNoteMode(false);
      startTimer();
    }

    function ensureSelection() {
      if (!selected) {
        selected = boardEl.firstChild;
        if (selected) selected.classList.add('selected');
      }
    }

    function moveSelection(dr, dc) {
      ensureSelection();
      const r = Number(selected.dataset.row);
      const c = Number(selected.dataset.col);
      const nr = (r + dr + 9) % 9;
      const nc = (c + dc + 9) % 9;
      selectCell(boardEl.children[nr * 9 + nc]);
    }

    function handleKey(event) {
      if (event.key === 'ArrowUp') { moveSelection(-1, 0); event.preventDefault(); return; }
      if (event.key === 'ArrowDown') { moveSelection(1, 0); event.preventDefault(); return; }
      if (event.key === 'ArrowLeft') { moveSelection(0, -1); event.preventDefault(); return; }
      if (event.key === 'ArrowRight') { moveSelection(0, 1); event.preventDefault(); return; }
      if (event.key === 'Enter') { toggleNoteMode(); return; }
      if (event.ctrlKey && event.key.toLowerCase() === 'z') { event.preventDefault(); undoAction(); return; }
      if (event.ctrlKey && (event.key.toLowerCase() === 'y' || (event.shiftKey && event.key.toLowerCase() === 'z'))) { event.preventDefault(); redoAction(); return; }

      ensureSelection();
      const digitMatch = /^(?:Digit|Numpad)([1-9])$/.exec(event.code);
      if (digitMatch) {
        const value = Number(digitMatch[1]);
        const highlightNote = noteMode && event.shiftKey;
        applyValue(value, { highlightNote });
        event.preventDefault();
      } else if (event.key === 'Backspace' || event.key === 'Delete' || event.key === '0') {
        applyValue(0);
      }
    }

    function revealHint() {
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (current[r][c] === 0) {
            recordStateForUndo();
            current[r][c] = solution[r][c];
            notes[r][c].clear();
            renderBoard();
            updateStatus();
            hintCount += 1;
            updateStats();
            return;
          }
        }
      }
      setStatus(t('statusNoHint'), 'warning');
    }

    function showSolution() {
      recordStateForUndo();
      current = cloneBoard(solution);
      ensureNotes();
      renderBoard();
      solvedAt = Date.now();
      stopTimer(true);
      solutionRevealed = true;
      updateStats();
      setStatus(t('statusSolutionShown'), 'success');
    }

    function undoAction() {
      if (!history.length) return;
      future.push({ current: cloneBoard(current), notes: cloneNotes(notes) });
      const prev = history.pop();
      restoreState(prev);
    }

    function redoAction() {
      if (!future.length) return;
      history.push({ current: cloneBoard(current), notes: cloneNotes(notes) });
      const next = future.pop();
      restoreState(next);
    }

    document.getElementById('newGame').addEventListener('click', loadNewPuzzle);
    document.getElementById('reset').addEventListener('click', () => resetBoard(true, true));
    document.getElementById('hint').addEventListener('click', revealHint);
    document.getElementById('solve').addEventListener('click', showSolution);
    undoEl.addEventListener('click', undoAction);
    redoEl.addEventListener('click', redoAction);
    document.addEventListener('keydown', handleKey);

    buildBoard();
    buildPad();
    initLanguage();
    setStatus(t('statusLoading'));
    loadNewPuzzle();
  </script>
</body>
</html>
